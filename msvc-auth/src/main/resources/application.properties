spring.application.name=msvc-auth
server.port=8021

spring.datasource.url=jdbc:h2:file:./data/auth
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=sa

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

msvc.user.url=http://localhost:8011

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/docs/swagger-ui.html

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

jwt.secret=clave-secreta-super-segura-para-jwt-esports-arena-manager-2026
jwt.expiration-minutes=60
