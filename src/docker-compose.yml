version: "3.9"

# ══════════════════════════════════════════════════════════════════════════════
# eSports Arena Manager — Docker Compose
#
# Uso:
#   docker-compose up --build        ← primera vez
#   docker-compose up                ← siguientes veces
#   docker-compose down              ← apagar
#   docker-compose logs -f msvc-game ← ver logs de un servicio
#
# Accesos:
#   http://localhost:8761                    → Panel Eureka
#   http://localhost:8080                    → API Gateway
#   http://localhost:8080/docs/swagger-ui.html → Swagger agregado
# ══════════════════════════════════════════════════════════════════════════════

# Clave JWT compartida por todos los servicios
x-jwt: &jwt
  JWT_SECRET: clave-secreta-super-segura-para-jwt-esports-arena-manager-2026

# URL de Eureka que usan todos para registrarse
x-eureka: &eureka
  EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://msvc-eureka:8761/eureka/

# BD H2 en memoria (común a todos los servicios de negocio)
x-h2: &h2
  SPRING_JPA_HIBERNATE_DDL_AUTO: update
  SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
  SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
  SPRING_DATASOURCE_USERNAME: sa
  SPRING_DATASOURCE_PASSWORD: sa

services:

  # ── INFRAESTRUCTURA ─────────────────────────────────────────────────────────

  msvc-eureka:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: msvc-eureka
    image: esports/msvc-eureka
    container_name: msvc-eureka
    ports:
      - "8761:8761"
    environment:
      SPRING_APPLICATION_NAME: msvc-eureka
      SERVER_PORT: 8761
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: "false"
      EUREKA_CLIENT_FETCH_REGISTRY: "false"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://localhost:8761/eureka/
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/ | grep -q 'Eureka' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - esports-net
    restart: unless-stopped

  msvc-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: msvc-gateway
    image: esports/msvc-gateway
    container_name: msvc-gateway
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      <<: *eureka
      <<: *jwt
    depends_on:
      msvc-eureka:
        condition: service_healthy
    networks:
      - esports-net
    restart: unless-stopped

  # ── AUTENTICACIÓN ───────────────────────────────────────────────────────────

  msvc-auth:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: msvc-auth
    image: esports/msvc-auth
    container_name: msvc-auth
    ports:
      - "8021:8021"
    environment:
      SERVER_PORT: 8021
      SPRING_DATASOURCE_URL: jdbc:h2:mem:auth;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      MSVC_USER_URL: http://msvc-user:8011
      JWT_EXPIRATION_MINUTES: 60
      <<: *jwt
      <<: *eureka
      <<: *h2
    depends_on:
      msvc-eureka:
        condition: service_healthy
    networks:
      - esports-net
    restart: unless-stopped

  # ── CAPA BASE ───────────────────────────────────────────────────────────────

  msvc-game:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: msvc-game
    image: esports/msvc-game
    container_name: msvc-game
    ports:
      - "8010:8010"
    environment:
      SERVER_PORT: 8010
      SPRING_DATASOURCE_URL: jdbc:h2:mem:games;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      <<: *jwt
      <<: *eureka
      <<: *h2
    depends_on:
      msvc-eureka:
        condition: service_healthy
    networks:
      - esports-net
    restart: unless-stopped

  msvc-user:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: msvc-user
    image: esports/msvc-user
    container_name: msvc-user
    ports:
      - "8011:8011"
    environment:
      SERVER_PORT: 8011
      SPRING_DATASOURCE_URL: jdbc:h2:mem:users;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      <<: *jwt
      <<: *eureka
      <<: *h2
    depends_on:
      msvc-eureka:
        condition: service_healthy
    networks:
      - esports-net
    restart: unless-stopped

  msvc-notification:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: msvc-notification
    image: esports/msvc-notification
    container_name: msvc-notification
    ports:
      - "8020:8020"
    environment:
      SERVER_PORT: 8020
      SPRING_DATASOURCE_URL: jdbc:h2:mem:notifications;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      <<: *jwt
      <<: *eureka
      <<: *h2
    depends_on:
      msvc-eureka:
        condition: service_healthy
    networks:
      - esports-net
    restart: unless-stopped

  # ── DOMINIO ─────────────────────────────────────────────────────────────────

  msvc-tournament:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: msvc-tournament
    image: esports/msvc-tournament
    container_name: msvc-tournament
    ports:
      - "8012:8012"
    environment:
      SERVER_PORT: 8012
      SPRING_DATASOURCE_URL: jdbc:h2:mem:tournaments;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      MSVC_GAME_URL: http://msvc-game:8010
      <<: *jwt
      <<: *eureka
      <<: *h2
    depends_on:
      msvc-eureka:
        condition: service_healthy
      msvc-game:
        condition: service_started
    networks:
      - esports-net
    restart: unless-stopped

  msvc-sanction:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: msvc-sanction
    image: esports/msvc-sanction
    container_name: msvc-sanction
    ports:
      - "8013:8013"
    environment:
      SERVER_PORT: 8013
      SPRING_DATASOURCE_URL: jdbc:h2:mem:sanctions;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      MSVC_USER_URL: http://msvc-user:8011
      <<: *jwt
      <<: *eureka
      <<: *h2
    depends_on:
      msvc-eureka:
        condition: service_healthy
      msvc-user:
        condition: service_started
    networks:
      - esports-net
    restart: unless-stopped

  # ── LÓGICA ──────────────────────────────────────────────────────────────────

  msvc-team:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: msvc-team
    image: esports/msvc-team
    container_name: msvc-team
    ports:
      - "8014:8014"
    environment:
      SERVER_PORT: 8014
      SPRING_DATASOURCE_URL: jdbc:h2:mem:teams;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      MSVC_USER_URL: http://msvc-user:8011
      MSVC_GAME_URL: http://msvc-game:8010
      <<: *jwt
      <<: *eureka
      <<: *h2
    depends_on:
      msvc-eureka:
        condition: service_healthy
      msvc-user:
        condition: service_started
      msvc-game:
        condition: service_started
    networks:
      - esports-net
    restart: unless-stopped

  msvc-registration:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: msvc-registration
    image: esports/msvc-registration
    container_name: msvc-registration
    ports:
      - "8015:8015"
    environment:
      SERVER_PORT: 8015
      SPRING_DATASOURCE_URL: jdbc:h2:mem:registrations;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      MSVC_TOURNAMENT_URL: http://msvc-tournament:8012
      MSVC_TEAM_URL: http://msvc-team:8014
      MSVC_USER_URL: http://msvc-user:8011
      MSVC_SANCTION_URL: http://msvc-sanction:8013
      <<: *jwt
      <<: *eureka
      <<: *h2
    depends_on:
      msvc-eureka:
        condition: service_healthy
      msvc-tournament:
        condition: service_started
      msvc-team:
        condition: service_started
      msvc-user:
        condition: service_started
      msvc-sanction:
        condition: service_started
    networks:
      - esports-net
    restart: unless-stopped

  # ── RESULTADOS ──────────────────────────────────────────────────────────────

  msvc-match:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: msvc-match
    image: esports/msvc-match
    container_name: msvc-match
    ports:
      - "8016:8016"
    environment:
      SERVER_PORT: 8016
      SPRING_DATASOURCE_URL: jdbc:h2:mem:matches;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      MSVC_TOURNAMENT_URL: http://msvc-tournament:8012
      MSVC_REGISTRATION_URL: http://msvc-registration:8015
      <<: *jwt
      <<: *eureka
      <<: *h2
    depends_on:
      msvc-eureka:
        condition: service_healthy
      msvc-tournament:
        condition: service_started
      msvc-registration:
        condition: service_started
    networks:
      - esports-net
    restart: unless-stopped

  msvc-result:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: msvc-result
    image: esports/msvc-result
    container_name: msvc-result
    ports:
      - "8017:8017"
    environment:
      SERVER_PORT: 8017
      SPRING_DATASOURCE_URL: jdbc:h2:mem:results;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      MSVC_MATCH_URL: http://msvc-match:8016
      <<: *jwt
      <<: *eureka
      <<: *h2
    depends_on:
      msvc-eureka:
        condition: service_healthy
      msvc-match:
        condition: service_started
    networks:
      - esports-net
    restart: unless-stopped

  # ── CIERRE ──────────────────────────────────────────────────────────────────

  msvc-ranking:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: msvc-ranking
    image: esports/msvc-ranking
    container_name: msvc-ranking
    ports:
      - "8018:8018"
    environment:
      SERVER_PORT: 8018
      SPRING_DATASOURCE_URL: jdbc:h2:mem:rankings;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      MSVC_TOURNAMENT_URL: http://msvc-tournament:8012
      MSVC_REGISTRATION_URL: http://msvc-registration:8015
      MSVC_RESULT_URL: http://msvc-result:8017
      <<: *jwt
      <<: *eureka
      <<: *h2
    depends_on:
      msvc-eureka:
        condition: service_healthy
      msvc-tournament:
        condition: service_started
      msvc-registration:
        condition: service_started
      msvc-result:
        condition: service_started
    networks:
      - esports-net
    restart: unless-stopped

  msvc-prize:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: msvc-prize
    image: esports/msvc-prize
    container_name: msvc-prize
    ports:
      - "8019:8019"
    environment:
      SERVER_PORT: 8019
      SPRING_DATASOURCE_URL: jdbc:h2:mem:prizes;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      MSVC_TOURNAMENT_URL: http://msvc-tournament:8012
      MSVC_RANKING_URL: http://msvc-ranking:8018
      <<: *jwt
      <<: *eureka
      <<: *h2
    depends_on:
      msvc-eureka:
        condition: service_healthy
      msvc-tournament:
        condition: service_started
      msvc-ranking:
        condition: service_started
    networks:
      - esports-net
    restart: unless-stopped

networks:
  esports-net:
    driver: bridge
